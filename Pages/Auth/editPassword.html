<!-- =======================================================
     Page Modification du mot de passe (utilisateur connecté)
     ======================================================= -->

<div class="hero-scene text-center text-white">
    <div class="hero-scene-content">
        <h1>Modifier mon mot de passe</h1>
    </div>
</div>

<div class="container py-5">
    <form id="editPasswordForm" class="w-100 mx-auto needs-validation" style="max-width: 500px;" novalidate>

        <!-- Zone d'alerte (erreur ou succès) -->
        <div id="alerteEditPwd" class="alert d-none" role="alert"></div>

        <!-- Ancien mot de passe (pour sécuriser la modification) -->
        <div class="mb-3">
            <label for="ancienMdp" class="form-label">Mot de passe actuel *</label>
            <input type="password" class="form-control" id="ancienMdp" name="ancienMdp" required>
            <div class="invalid-feedback">Le mot de passe actuel est requis.</div>
        </div>

        <!-- Nouveau mot de passe avec même regex que l'inscription -->
        <div class="mb-3">
            <label for="nouveauMdp" class="form-label">Nouveau mot de passe *</label>
            <input type="password" class="form-control" id="nouveauMdp" name="nouveauMdp"
                   required minlength="8"
                   pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*(),.?\":{}|<>]).{8,}$">
            <div class="form-text">
                Au moins 8 caractères, 1 majuscule, 1 chiffre, 1 caractère spécial.
            </div>
            <div class="invalid-feedback">
                Le nouveau mot de passe ne respecte pas les critères de sécurité.
            </div>
        </div>

        <!-- Confirmation du nouveau mot de passe -->
        <div class="mb-3">
            <label for="confirmMdp" class="form-label">Confirmer le nouveau mot de passe *</label>
            <input type="password" class="form-control" id="confirmMdp" name="confirmMdp" required>
            <div class="invalid-feedback">Les mots de passe ne correspondent pas.</div>
        </div>

        <!-- Bouton de validation -->
        <div class="text-center">
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-check-circle" aria-hidden="true"></i> Modifier le mot de passe
            </button>
        </div>

        <!-- Lien de retour -->
        <div class="text-center pt-3">
            <a href="/compte">Retour à mon compte</a>
        </div>
    </form>
</div>
